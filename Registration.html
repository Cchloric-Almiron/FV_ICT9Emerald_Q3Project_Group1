<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 3</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">

<style>

body{
     background-image:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("https://i.pinimg.com/1200x/08/90/db/0890dbd4ba36c0e005906b2f20b067b8.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    font-family:"Jersey 25", sans-serif;
    margin:0;
    padding:0;
}

/* Navbar */
nav{
    color:black;
    font-family:"Jersey 25", sans-serif;
    background-color:#a2a7a9;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar-nav .nav-link{
    color:black !important;
    font-weight:bold;
}

/* Container */
.container{
    display:flex;
    justify-content:center;
    padding-top:50px;
    padding-bottom:50px;
}


.register-card{
    background:rgba(255,255,255,0.8);
    border-radius:18px;
    padding:40px;
    max-width:900px;
    width:100%;
}

.row.align-items-center{
    align-items:center;
}

/* Photo Box (Transparent) */
.photo-box{
    background:rgba(125,60,60,0.9);
    padding:20px;
    border-radius:18px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
}

.photo-box img{
    width:150px;
    border-radius:50%;
    margin-bottom:15px;
}

.btn-upload{
    background:white;
    border:none;
    color:rgb(125,60,60);
    padding:10px 22px;
    border-radius:30px;
    font-weight:bold;
    width:100%;
}

/* Form Styling */
.form-box input,
.form-box textarea{
    margin-bottom:10px;
}

.form-title{
    text-align:center;
    font-size:28px;
    margin-bottom:25px;
}

/* Buttons */
.btn-create{
    background:rgb(125,60,60);
    border:none;
    color:white;
    padding:12px 22px;
    border-radius:30px;
    font-weight:bold;
    width:100%;
}

/* Footer */
.footer{
    background-color:#a2a7a9;
    color:white;
    text-align:center;
    font-size:14px;
    padding:15px 0;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    font-family:"Jersey 25", sans-serif;
}

</style>
</head>

<body>

    <!-- Navbar -->
         <nav class="navbar navbar-expand-sm">
             <div class="container-fluid">

     <a class="navbar-brand" href="#">
    <img src="https://scontent.fmnl4-1.fna.fbcdn.net/v/t1.15752-9/639506426_1240222411560794_3865281472509557468_n.png?_nc_cat=106&ccb=1-7&_nc_sid=0024fc&_nc_ohc=b9-XraEZRAIQ7kNvwFiVKva&_nc_oc=AdkaNQ3GJhvLyQyyhDugXskfV1UbruU9_9xylaktdFt2_B6h1-xyReZVf80Q6F92tkY&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.fmnl4-1.fna&_nc_ss=8&oh=03_Q7cD4wF42LSYAx8uX5U7LCpHVu3e6BKNw8P1TZNRqk1nLyIAwA&oe=69CE37F1" style="width:150px;"></a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
        <span class="navbar-toggler-icon"></span>
        </button>

   <div class="collapse navbar-collapse" id="mynavbar">s
        <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="fare.html">Fare Matrix</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Schedule</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
        </ul>

        <div class="ms-auto">
        <a class="text-white me-3">Book Now</a>
        <a href="registration.html" class="btn nav-link nav-item" style="color:black;">Create Account</a>
        </div>

        </div>
            </div>
                </div>
                     </nav>

            <!--Main-->
               <div class="container">
                 <div class="register-card">

                 <div class="row g-4 align-items-center">

            <!-- Photo Box -->
                <div class="col-md-4">
                 <div class="photo-box">
                    <img src="https://i.pinimg.com/1200x/65/1c/6d/651c6da502353948bdc929f02da2b8e0.jpg" alt="Profile Picture">
                    <input type="file" class="form-control" accept="image/*">
                    <button class="btn-upload mt-3" onclick="alert('Profile photo uploaded!')">Upload Photo</button>
                     </div>
                        </div>

                <!-- Registration Form -->
                <div class="col-md-8">
                 <div class="form-box">
                    <div class="form-title">Registration Form</div>

                <input type="text" class="form-control" placeholder="First Name" required>
                <input type="text" class="form-control" placeholder="Last Name" required>
                <input type="number" class="form-control" placeholder="Age" required>
                <input type="text" class="form-control" placeholder="Contact Number" required>
                <input type="email" class="form-control" placeholder="Email" required>
                <input type="text" class="form-control" placeholder="Username" required>
                <input type="password" class="form-control" placeholder="Password" required>

                <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" required>
                <label class="form-check-label">Accept Terms of Use and Privacy Policy</label>
                  </div>
                    <button class="btn-create">Create my account</button>
                     <button type="button" class="btn btn-secondary w-100 mt-2" onclick="window.location.reload()">Cancel</button>

                   </div>
                    </div>
                     </div>
                      </div>
                         </div>

      <!-- Footer -->
        <div class="footer">
         <p>© 2026 Almiron, Miranda | 9-Emerald</p>
        </div>

</body>
</html>
