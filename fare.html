<br>
<h1 style="font-size:70px;">LRT Line 2</h1>

 <form action="#" style="font-size:20px; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; margin-left:20px;">

          <option value="12">Marikina-Pasig</option>
          <option value="13">Antipolo</option>
        </select>

       <hr>

        <label form="dropoff">Drop-off location</label>
        <br>
        <select id="dropoff">
          <option value="none">Select</option>
          <option value="1">Recto</option>
          <option value="2">Legarda</option>
          <option value="3">Pureza</option>
          <option value="4">V.Mapa</option>
          <option value="5">J.Ruiz</option>
          <option value="6">Gilmore</option>
          <option value="7">Betty Go-Belmonte</option>
          <option value="8">Araneta Center-Cubao</option>
          <option value="9">Anonas</option>
          <option value="10">Katipunan</option>
          <option value="11">Santolan</option>
          <option value="12">Marikina-Pasig</option>
          <option value="13">Antipolo</option>
        </select>
      </form>
<hr>
  
<label><input type="checkbox" id="disc">Apply 20% discount (Senior, Student, PWD)</label>
<hr>
<button type="Submit" onclick="calcfare()" class="btn btn-success">Calculate</button>
<button type="button" onclick="window.location.reload()" class="btn btn-info">Refresh</button>
<hr>

<h1>Your Fare is: <span id="result"></span></h1>




<script>

  function calcfare() {

    let basefare, baseKM, perKMrate, distance, extraKM, pickup, dropoff;

    pickup = parseFloat(document.getElementById("pickup").value);
    dropoff = parseFloat(document.getElementById("dropoff").value); 

      basefare = 50; //minimum fare which also include first 2KM
      perKMrate = 15; //cost per km beyond 2KM
      baseKM = 2; //distance inluded in the base fare
    
    let discount = document.getElementById("disc").checked; 

      distance = Math.max(Math.abs(dropoff - pickup),0);
      extraKM = Math.max(distance - baseKM, 0);

    //fare
    let fare = basefare + extraKM * perKMrate; //regular rate
    //discount
    fare = fare * (1 - 0.2 * discount); 

    //display
   document.getElementById("result").innerHTML = "Php" + fare.toFixed(2);

  }

</script>
