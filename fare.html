<center>
<div id="mainfare">
<h2>LRT Line 2</h2>

 <form action="#">
        <label form="pickup">Pick-up location</label>
        <input type="value" id="pickup" class="form-control" placeholder="Input your text" required>

        <br>

        <label form="dropoff">Drop-off location</label>
        <input type="value" id="dropoff" class="form-control" placeholder="Input your text" required>

        <button>Regular Fare</button>
        <button type="submit" class=" btn btn-info" onmouseover="">Discounted Fare</button>

    </form>

<script>

  function calcfare() {
    let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;
      
      pickup = parsefloat(document.getElementById("pickup").value);//convert string to number
      dropoff = parseFloat(document.getElementById("dropoff").value); 

      basefare = 50; //minimum fare which also include first 2KM
      perKMrate = 15; //cost per km beyond 2KM
      baseKM = 2; //distance inluded in the base fare
      discount = document.getElementById("disc").checked; //when discount box is clicked, it's true and behaves like 1

      //distance cant be negative, same station handled as 0 distance

      distance = Math.max(Math.abs(dropoff - pickup),0); //selects first value, but if negative, selects 0; it also gets absolute when changing stations to avoid negative values

      extraKM = Math.max(distance - baseKM, 0);// Calculates KM if it exceeds the base fare

    //fare calculation

    let fare = basefare + extraKM * perKMrate; //regular rate

    //discount
    fare = fare * (1 - 0.2 * discount); //if discount box is clicked, it's false, and it behaves like 0

    //display
    document.getElementById("Display").innerHTML = "Php" + fare.toFixed(2);

  }

</script>
    

</div>
